<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贪吃蛇</title>
    <style>
      :root {
        --bg: #0b0f14;
        --panel: #0f1620;
        --text: #e6edf3;
        --muted: #9aa4b2;
        --accent: #4cc9f0;
        --good: #47d16c;
        --bad: #ff4d4d;
      }
      html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji"; }
      .wrap { min-height: 100%; display: grid; place-items: center; padding: 20px; box-sizing: border-box; }
      .card { width: min(720px, 100%); background: var(--panel); border: 1px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 16px; box-sizing: border-box; }
      header { display: flex; gap: 12px; align-items: baseline; justify-content: space-between; margin-bottom: 10px; }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
      header .stats { display: flex; gap: 12px; font-size: 13px; color: var(--muted); }
      canvas { width: 100%; height: auto; background: #05070a; border-radius: 10px; display: block; }
      .controls { margin-top: 12px; display: grid; gap: 10px; }
      .row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: space-between; }
      .keys { font-size: 13px; color: var(--muted); line-height: 1.5; }
      .btns { display: flex; gap: 8px; flex-wrap: wrap; }
      button { appearance: none; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: var(--text); border-radius: 10px; padding: 8px 10px; cursor: pointer; font-size: 13px; }
      button:hover { border-color: rgba(255,255,255,0.22); }
      button.primary { border-color: rgba(76,201,240,0.45); }
      button.primary:hover { border-color: rgba(76,201,240,0.85); }
      .hint { font-size: 12px; color: var(--muted); }
      .badge { font-variant-numeric: tabular-nums; }
      .status { font-size: 13px; color: var(--muted); }
      .status strong { color: var(--text); }
      .status .over { color: var(--bad); }
      .status .paused { color: var(--accent); }
      @media (max-width: 520px) {
        header { flex-direction: column; align-items: flex-start; }
        .row { justify-content: flex-start; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <header>
          <h1>贪吃蛇（网页本地版）</h1>
          <div class="stats">
            <div>分数：<span id="score" class="badge">0</span></div>
            <div>最高：<span id="best" class="badge">0</span></div>
            <div>
              难度：
              <select id="difficulty" aria-label="difficulty" style="margin-left:6px; background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 6px 8px;">
                <option value="newbie">新手</option>
                <option value="easy">简单</option>
                <option value="hard">困难</option>
                <option value="insane">极难</option>
              </select>
            </div>
            <div>速度：<span id="speed" class="badge">1.00x</span></div>
          </div>
        </header>

        <canvas id="game" width="600" height="600" aria-label="Snake game" role="img"></canvas>

        <div class="controls">
          <div class="row">
            <div class="btns">
              <button id="btnStart" class="primary">开始 / 重开（Enter）</button>
              <button id="btnPause">暂停 / 继续（Space）</button>
              <button id="btnStep" title="暂停时单步前进">单步（S）</button>
            </div>
            <div class="status" id="status">状态：<strong>未开始</strong></div>
          </div>

          <div class="row">
            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
              <div style="font-size:13px; color: var(--muted);">控制方式：</div>
              <select id="controlMode" aria-label="control mode" style="background: rgba(255,255,255,0.06); color: var(--text); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 6px 8px;">
                <option value="keyboard">键盘转向（A/D转向，W前进）</option>
                <option value="mouse">鼠标指向（蛇头朝向鼠标）</option>
              </select>
            </div>

            <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
              <div style="font-size:13px; color: var(--muted);">冲刺能量：</div>
              <div style="width:220px; height:10px; border-radius:999px; border:1px solid rgba(255,255,255,0.14); background: rgba(255,255,255,0.06); overflow:hidden;">
                <div id="energyFill" style="height:100%; width:100%; background: linear-gradient(90deg, rgba(76,201,240,0.95), rgba(71,209,108,0.95));"></div>
              </div>
              <div id="energyText" class="badge" style="font-size:12px; color: var(--muted);">100%</div>
            </div>
          </div>

          <div class="keys">
            模式：30×30 有边界；画面跟随蛇头居中；蛇可 360° 转向；自撞不死亡（可覆盖）。<br />
            控制：Enter 开始/重开；Space 暂停；按住 Space 可冲刺（消耗能量，充能 10 秒，消耗速度为充能的 2 倍，单次最多冲刺 5 秒）。<br />
            键盘转向：W 前进，A/D 转向；鼠标模式：蛇头朝向鼠标，自动前进。<br />
            提示：如遇键盘无效，先点一下画布。
          </div>
          <div class="hint">保存最高分：使用本地 localStorage（不联网）。</div>
        </div>
      </div>
    </div>

    <!-- Cache-bust: update the v= whenever logic changes so GitHub Pages clients get fresh JS -->
    <script src="main.js?v=20260305-2"></script>
  </body>
</html>
